# ========
# qtl.yaml
# ========
# QTL data configuration for colocalization analysis

qtl_info:
  # QTL data build version (hg19 or hg38) - required for coordinate matching
  build: "hg38"
  # Path to QTL metadata CSV (must contain columns below)
  file: "/home/lyc/share_group_folder/work/EasyColoc/QTL_summary.csv"
  # Column mapping in metadata CSV
  columns:
    # Unique QTL dataset identifier (e.g., "eQTL", "pQTL")
    id: "Type"
    # Sample size for this QTL dataset
    sample_size: "NumberRNASeqandGTSamples"
    # Filename column for ALL variant-phenotype pairs
    all_filename: "allPairsTabixFilename"  # All variant-phenotype pairs (nominal p-values)
    sig_filename: "sigPairsTabixFilename"  # Permutation-significant phenotypes (gatekeeper filter)

# ==========================================
# QTL Tabix File Format Configuration
# ==========================================

# Column header names in the Tabix files
QTL_all_header:
  - "chr"
  - "pos"
  - "ref"
  - "alt"
  - "phenotype_id"  # APA event ID (e.g., ENST00000303660.8|ZEB2|chr2:144389317-144390028|-)
  - "variant_id"    # Variant identifier (e.g., chr2:144000166:C:T)
  - "start_distance"
  - "end_distance"
  - "af"
  - "ma_samples"
  - "ma_count"
  - "pval_nominal"
  - "slope"
  - "slope_se"

QTL_cols:
  phenotype: "phenotype_id"  # APA event ID (e.g., ENST00000304952.11|HES4|chr1:998964-999432|-)
  chrom: "chr"
  pos: "pos"
  pval: "pval_nominal"
  beta: "slope"
  se: "slope_se"
