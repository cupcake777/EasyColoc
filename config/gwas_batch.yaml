## 高级配置

### 覆盖全局参数

如需为特定 GWAS 数据集覆盖全局配置，可添加 `override` 字段：

```yaml
datasets:
  - id: "Custom_GWAS"
    file: "/path/to/gwas.txt"
    build: "hg19"
    type: "cc"
    prop: 0.5
    override:
      coloc_settings:
        pp4_threshold: 0.8      # 自定义 PP4 阈值
        susie_threshold: 0.5    # 自定义 SuSiE 阈值
      plot_settings:
        plot_window_bp: 500000  # 自定义绘图窗口
```

### 并行处理

修改 `config/global.yaml` 中的核心数以加速处理：

```yaml
use_parallel: true
n_cores: 8  # 根据你的服务器调整
```

---

## 故障排除

### 问题：某个 GWAS 数据集失败

检查单个日志文件：
```bash
cat batch_results/EUR_ASD/run_EUR_ASD.log
```

### 问题：所有数据集都失败

检查全局配置：
```bash
cat config/global.yaml
```

确保参考文件路径正确：
- `plink_hg38`: 1000 Genomes PLINK 参考
- `hash_table_dir`: dbSNP 哈希表目录
- `gene_anno`: GENCODE GTF 文件

### 问题：内存不足

减少并行核心数或增加 `min_snps` 阈值：
```yaml
coloc_settings:
  min_snps: 50  # 增加最小 SNP 数要求
```
