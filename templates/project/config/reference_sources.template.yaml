defaults:
  mode: symlink

resources:
  plink_hg19:
    source: /ABSOLUTE/PATH/TO/1kg_hg19_filtered
    target: refs/plink/hg19/1kg_hg19_filtered

  plink_hg38:
    source: /ABSOLUTE/PATH/TO/1kg_hg38_filtered
    target: refs/plink/hg38/1kg_hg38_filtered

  plink_keep:
    source: /ABSOLUTE/PATH/TO/EAS.sample
    target: refs/plink/keep/EAS.sample

  ref_genome_hg19:
    source: /ABSOLUTE/PATH/TO/Homo_sapiens.GRCh37.dna.primary_assembly.fa.gz
    target: refs/fasta/GRCh37.fa.gz

  ref_genome_hg38:
    source: /ABSOLUTE/PATH/TO/Homo_sapiens.GRCh38.dna.primary_assembly.fa.gz
    target: refs/fasta/GRCh38.fa.gz

  dbsnp_hg19:
    source: /ABSOLUTE/PATH/TO/GCF_000001405.25.gz
    target: refs/dbsnp/dbsnp_hg19.gz

  dbsnp_hg38:
    source: /ABSOLUTE/PATH/TO/GCF_000001405.40.gz
    target: refs/dbsnp/dbsnp_hg38.gz

  1kg_af:
    source: /ABSOLUTE/PATH/TO/af_ref
    target: refs/af

  gene_anno:
    source: /ABSOLUTE/PATH/TO/gencode.v40.annotation.gtf.gz
    target: refs/gene/gencode.v40.annotation.gtf.gz

  recom:
    source_prefix: /ABSOLUTE/PATH/TO/CHB
    target: refs/recomb/CHB

  liftover_chain:
    source: /ABSOLUTE/PATH/TO/hg19ToHg38.over.chain.gz
    target: refs/liftover/hg19ToHg38.over.chain.gz

  # Optional: if you have dbSNP BED files and want EasyColoc hash-table rescue
  # matching, build them directly into the project.
  # hash_table_dir:
  #   build_from_bed_dir: /ABSOLUTE/PATH/TO/dbsnp_bed_hg38
  #   build: hg38
  #   target: refs/hash_tables
