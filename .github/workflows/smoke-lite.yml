name: smoke-lite

on:
  push:
  pull_request:

jobs:
  syntax-and-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - name: Install R dependencies
        run: |
          install.packages(c("data.table", "dplyr", "glue", "jsonlite", "yaml"), repos="https://cloud.r-project.org")
        shell: Rscript {0}
      - name: Parse R entrypoints
        run: Rscript tests/check_parse.R
      - name: Shell syntax and init scaffold
        run: bash tests/smoke_test_cli.sh

  core-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - name: Install R dependencies
        run: |
          install.packages(c("data.table", "dplyr", "glue", "jsonlite", "yaml"), repos="https://cloud.r-project.org")
        shell: Rscript {0}
      - name: Summary And Report Smoke Test
        run: Rscript tests/smoke_test_summary_report.R
      - name: Runtime Monitor Smoke Test
        run: Rscript tests/smoke_test_runtime_monitor.R
      - name: Output Directory Tools Smoke Test
        run: Rscript tests/smoke_test_output_dir_tools.R
      - name: Doctor Smoke Test
        run: Rscript tests/smoke_test_doctor.R
