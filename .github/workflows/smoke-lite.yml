name: smoke-lite

on:
  push:
  pull_request:

jobs:
  syntax-and-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - name: Install R dependencies
        run: |
          Rscript -e 'install.packages(c("data.table", "dplyr", "coloc"), repos="https://cloud.r-project.org")'
      - name: Parse R entrypoints
        run: Rscript tests/check_parse.R
      - name: Shell syntax and init scaffold
        run: bash tests/smoke_test_cli.sh
