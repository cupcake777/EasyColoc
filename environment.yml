name: easycoloc
channels:
  - conda-forge
  - bioconda
dependencies:
  - python>=3.9,<3.13
  - pip=24.0
  - r-base>=4.2.0
  - plink>=1.9
  - tabix
  - bcftools
  - bedtools
  - samtools
  - r-data.table
  - r-dplyr
  - r-yaml
  - r-glue
  - r-jsonlite
  - r-coloc
  - r-susier
  - r-ggplot2
  - r-viridis
  - r-ggpubr
  - r-ggrepel
  - r-tidyr
  - bioconductor-genomicranges
  - bioconductor-rtracklayer
  - bioconductor-clusterprofiler
  - bioconductor-org.hs.eg.db
  - bioconductor-txdb.hsapiens.ucsc.hg38.knowngene
  - bioconductor-genomicfeatures
  - bioconductor-annotationdbi
  - pip:
      - adjusttext==0.8
      - biopython>=1.79
      - gtfparse==1.3.0
      - liftover>=1.1.13,<=1.3.1
      - matplotlib>=3.8,<3.9
      - numpy>=1.21.2,<2
      - pandas>=1.3,!=1.5
      - pyensembl==2.2.3
      - pysam==0.22.1
      - scikit-allel>=1.3.5
      - scipy>=1.12
      - seaborn>=0.12
      - h5py>=3.10.0
      - pyarrow
      - polars>=1.27.0
